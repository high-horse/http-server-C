<!DOCTYPE html>
<html>
<head>
    <title>My Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<style>
    /* Reset */
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    
    /* Body */
    body {
        font-family: Arial, sans-serif;
        line-height: 1.6;
        background-color: #f4f4f4;
        color: #333;
    }
    
    /* Navigation */
    nav {
        background: #333;
        padding: 1rem 0;
    }
    
    nav ul {
        list-style: none;
        display: flex;
        justify-content: center;
    }
    
    nav ul li {
        margin: 0 20px;
    }
    
    nav ul li a {
        color: white;
        text-decoration: none;
        font-weight: bold;
    }
    
    nav ul li a:hover {
        color: #00adb5;
    }
    
    /* Container */
    .container {
        width: 80%;
        margin: auto;
        padding: 2rem 0;
        text-align: center;
    }
    
    /* Hero Section */
    .hero {
        padding: 3rem 0;
    }
    
    .hero h1 {
        font-size: 2.5rem;
        margin-bottom: 1rem;
    }
    
    /* Cards */
    .card {
        background: white;
        padding: 1.5rem;
        margin: 1rem 0;
        border-radius: 8px;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    
    /* Footer */
    footer {
        background: #333;
        color: white;
        text-align: center;
        padding: 1rem 0;
        margin-top: 2rem;
    }
</style>

<nav>
    <ul>
        <li><a href="index">Home</a></li>
        <li><a href="about">About</a></li>
        <li><a href="projects">Projects</a></li>
        <li><a href="contact">Contact</a></li>
    </ul>
</nav>

<div class="container hero">
    <h1>Hello, I'm John Doe and this site is being served using pure C.</h1>
    <p>Web Developer | Designer | Freelancer</p>
</div>

<footer>
    <p>© 2026 John Doe | All Rights Reserved</p>
</footer>

</body>
</html>
